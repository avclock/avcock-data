# Auto-regenerates the airport + heliport datasets from OurAirports and
# commits them into this repo's /data folder. The apps read the files
# from raw.githubusercontent.com — no GitHub Pages needed.
#
# This file lives at: .github/workflows/update-data.yml
name: Update datasets

on:
  schedule:
    - cron: "0 6 * * 1"      # every Monday 06:00 UTC
  workflow_dispatch: {}        # also lets you run it by hand

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync to latest main
        run: |
          git fetch origin main
          git reset --hard origin/main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests timezonefinder
      - name: Build datasets
        run: >
          python data-pipeline/build_datasets.py
          --base-url "https://raw.githubusercontent.com/${{ github.repository }}/main/data"
          --out data
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Update datasets"
          git push origin HEAD:main
