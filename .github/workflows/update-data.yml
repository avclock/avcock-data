name: Update datasets

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests timezonefinder
      - name: Build datasets
        run: >
          python data-pipeline/build_datasets.py
          --base-url "https://raw.githubusercontent.com/${{ github.repository }}/main/data"
          --out data
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data
          git commit -m "Update datasets" || echo "No changes to commit."
          git push
